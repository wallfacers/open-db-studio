<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open DB Studio</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #080d12;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .splash-logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .splash-icon {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: linear-gradient(135deg, #3b82f6 0%, #22d3ee 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        font-weight: 700;
        color: #fff;
      }
      .splash-title {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 20px;
        font-weight: 600;
        color: #b5cfe8;
        letter-spacing: 0.3px;
      }
      .splash-bar-wrap {
        width: 200px;
        height: 2px;
        background: rgba(181, 207, 232, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      .splash-bar {
        height: 100%;
        background: linear-gradient(90deg, #1e6fcf, #0ea5e9);
        border-radius: 2px;
        animation: bar-slide 1.6s ease-in-out infinite;
      }
      @keyframes bar-slide {
        0%   { width: 0%;   margin-left: 0%; }
        50%  { width: 60%;  margin-left: 20%; }
        100% { width: 0%;   margin-left: 100%; }
      }
    </style>
  </head>
  <body style="margin:0;background:#080d12;">
    <div id="splash">
      <div class="splash-logo">
        <div class="splash-icon">DB</div>
        <span class="splash-title">Open DB Studio</span>
      </div>
      <div class="splash-bar-wrap">
        <div class="splash-bar"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
