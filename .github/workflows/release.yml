name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      force:
        description: "Force rebuild even if tag already exists"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Job 1: 版本校验 + Tag 存在性检查
  # ─────────────────────────────────────────────
  check:
    name: Check version and tag
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.read_version.outputs.version }}
      skip: ${{ steps.check_tag.outputs.skip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from tauri.conf.json
        id: read_version
        run: |
          VERSION=$(python3 -c "import sys, json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          echo "VERSION=$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify package.json version matches tauri.conf.json
        run: |
          TAURI_VERSION="${{ steps.read_version.outputs.version }}"
          PKG_VERSION=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          echo "tauri.conf.json version : $TAURI_VERSION"
          echo "package.json version    : $PKG_VERSION"
          if [ "$TAURI_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Version mismatch! tauri.conf.json=$TAURI_VERSION package.json=$PKG_VERSION"
            exit 1
          fi
          echo "Versions match: $TAURI_VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          VERSION="${{ steps.read_version.outputs.version }}"
          FORCE="${{ github.event.inputs.force }}"
          if [ "$FORCE" = "true" ]; then
            echo "Force mode enabled — skipping tag existence check."
            echo "skip=false" >> $GITHUB_OUTPUT
          elif git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q "refs/tags/v${VERSION}"; then
            echo "::warning::Tag v${VERSION} already exists — skipping build."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Tag v${VERSION} does not exist — proceeding with build."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────
  # Job 2: 三平台并行构建 + 上传 Release 产物
  # ─────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    needs: check
    if: needs.check.outputs.skip == 'false'
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_args: ""
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            tauri_args: ""
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_args: ""

    env:
      VERSION: ${{ needs.check.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 系统依赖（仅 Linux）──────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libfuse2

      # ── Node.js ──────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ── Rust ─────────────────────────────────
      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      # ── 前端依赖 ─────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── Sidecar 二进制 ───────────────────────
      - name: Download sidecar binary
        run: npm run download:sidecar

      # ── Skills 构建 ──────────────────────────
      - name: Build skills
        run: npm run build:skills

      # ── macOS 签名（可选，secrets 未设置或无效时自动跳过）──
      - name: Import macOS signing certificate
        if: matrix.platform == 'macos-latest' || matrix.platform == 'macos-13'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE not configured, skipping signing setup."
            echo "CERT_IMPORTED=false" >> $GITHUB_ENV
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # 创建临时 keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 导入证书（失败时跳过签名而非中断构建）
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          if security import "$CERT_PATH" \
              -P "$APPLE_CERTIFICATE_PASSWORD" \
              -A \
              -t cert \
              -f pkcs12 \
              -k "$KEYCHAIN_PATH"; then
            # 将 keychain 加入搜索列表
            security list-keychain -d user -s "$KEYCHAIN_PATH"
            echo "CERT_IMPORTED=true" >> $GITHUB_ENV
            echo "Certificate imported successfully."
          else
            echo "::warning::Certificate import failed, building without code signing."
            echo "CERT_IMPORTED=false" >> $GITHUB_ENV
          fi

      # ── Tauri 构建 ───────────────────────────
      - name: Build Tauri app
        run: npx tauri build ${{ matrix.tauri_args }}
        env:
          TAURI_SKIP_DEVSERVER_CHECK: "true"
          # Linux AppImage 修复：linuxdeploy 在无 FUSE 的 CI 环境中需要 extract-and-run 模式
          APPIMAGE_EXTRACT_AND_RUN: "1"
          # macOS 签名：仅在证书成功导入时传入（CERT_IMPORTED 由 Import 步骤写入 $GITHUB_ENV）
          APPLE_CERTIFICATE: ${{ env.CERT_IMPORTED == 'true' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ env.CERT_IMPORTED == 'true' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_ID: ${{ env.CERT_IMPORTED == 'true' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ env.CERT_IMPORTED == 'true' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ env.CERT_IMPORTED == 'true' && secrets.APPLE_TEAM_ID || '' }}

      # ── 上传产物到 GitHub Release ─────────────
      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: "v${{ env.VERSION }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 创建 git tag（仅在 ubuntu runner 上执行一次，幂等）──
      - name: Create and push git tag
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "refs/tags/v${{ env.VERSION }}" | grep -q "refs/tags/v${{ env.VERSION }}"; then
            echo "Tag v${{ env.VERSION }} already exists, skipping."
          else
            git tag "v${{ env.VERSION }}"
            git push origin "v${{ env.VERSION }}"
            echo "Tag v${{ env.VERSION }} created and pushed."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
